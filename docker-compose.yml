# Base de datos de resultados de validación (PostgreSQL).
#
# Uso:
#   docker compose up -d db
#   El esquema y el catálogo de ejemplo se crean automáticamente al iniciar.
#   Conexión por defecto: postgresql://gx:gx@localhost:5432/gx
#
# Para reiniciar desde cero (recrear esquema/seed): docker compose down && up.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gx
      POSTGRES_PASSWORD: gx
      POSTGRES_DB: gx
    ports:
      - "5432:5432"
    volumes:
      - ./src/interface_validator/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./src/interface_validator/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gx -d gx"]
      interval: 5s
      timeout: 3s
      retries: 10
