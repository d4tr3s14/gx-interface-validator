# Stack de resultados + reportería:
#   PostgreSQL (resultados)  ->  Metabase (dashboards)
#
# Uso:
#   docker compose up -d db                 # solo la base de datos
#   docker compose up -d                    # BD + Metabase
#   python scripts/setup_metabase.py        # autoconfigura admin + datasource + dashboard
#
#   PostgreSQL: postgresql://gx:gx@localhost:5432/gx
#   Metabase  : http://localhost:3000   (admin@gx.local / gxgxgxgx1)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gx
      POSTGRES_PASSWORD: gx
      POSTGRES_DB: gx
    ports:
      - "5432:5432"
    volumes:
      - ./src/interface_validator/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./src/interface_validator/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gx -d gx"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Metabase: dashboards de reportería (sin código) sobre las vistas vw_*.
  metabase:
    image: metabase/metabase:v0.50.26
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2                       # almacén interno de Metabase (demo)
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      db:
        condition: service_healthy

  # Sirve los informes generados (output/) por HTTP, para enlazarlos desde Metabase.
  reports:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
    command: ["nginx", "-g", "daemon off;"]

volumes:
  metabase-data:
