name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------
  # Pruebas en la matriz de versiones de Python
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Generate synthetic sample data
        run: python scripts/generate_sample_data.py

      - name: Run tests (pytest + BDD)
        run: pytest

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: allure-results/

  # ---------------------------------------------------------------------
  # Pruebas de la capa de base de datos (ETL, comparación, catálogo) contra
  # un PostgreSQL real levantado como servicio.
  # ---------------------------------------------------------------------
  db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gx
          POSTGRES_PASSWORD: gx
          POSTGRES_DB: gx
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U gx -d gx"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://gx:gx@localhost:5432/gx
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (con extra [db])
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,db]"

      - name: Generate synthetic sample data
        run: python scripts/generate_sample_data.py

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Init schema + seed
        env:
          PGPASSWORD: gx
        run: |
          psql -h localhost -U gx -d gx -f src/interface_validator/db/schema.sql
          psql -h localhost -U gx -d gx -f src/interface_validator/db/seed.sql

      - name: Run DB tests (ETL, comparación, catálogo)
        run: pytest tests/test_etl.py tests/test_catalog.py -v

  # ---------------------------------------------------------------------
  # Publica el reporte Allure en GitHub Pages y deja los informes
  # HTML/PDF como artefacto descargable (solo en push a main).
  # ---------------------------------------------------------------------
  report:
    name: Allure report & sample reports
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Generate synthetic sample data
        run: python scripts/generate_sample_data.py

      - name: Run tests (produce Allure results)
        run: pytest
        continue-on-error: true

      - name: Generate sample HTML/PDF reports
        run: |
          mkdir -p generated-reports
          validate-interface --file data/sample/SAMPLE01_F20250402.FC --layout sample01 --report both --system RIESGO --output generated-reports || true
          validate-interface --file data/sample/SAMPLE01_F20250404.FC --layout sample01 --report both --system RIESGO --output generated-reports || true
          validate-interface --file data/sample/SAMPLE02_F20250404.FC --layout sample02 --report both --system TESORERIA --output generated-reports || true

      - name: Upload sample reports (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: sample-reports
          path: generated-reports/

      - name: Restore Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        run: |
          npm install -g allure-commandline
          mkdir -p allure-results
          if [ -d gh-pages/history ]; then cp -r gh-pages/history allure-results/; fi
          allure generate allure-results -o allure-report --clean

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
